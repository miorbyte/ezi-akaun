<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Niaga - Rekod Jualan & Baki Terkini</title>
    <style>
        :root { 
            --primary: #1e272e; 
            --success: #05c46b; 
            --danger: #ff3f34; 
            --warning: #f1c40f;
            --accent: #3c40c6; 
            --border-color: #d2dae2; 
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f1f2f6; margin: 0; padding: 15px; color: #2f3542; }
        .container { max-width: 1150px; margin: 0 auto; }
        
        .nama-syarikat-input { 
            font-size: 32px; font-weight: 900; text-align: center; color: var(--primary); 
            border: 4px solid var(--primary); background: white; padding: 15px; 
            border-radius: 20px; width: 100%; margin-bottom: 25px; outline: none; 
            text-transform: uppercase; box-shadow: 8px 8px 0 #bdc3c7; 
        }
        
        .grid-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .dashboard-card { background: white; padding: 25px; border-radius: 25px; border: 4px solid var(--primary); }
        .card-header { font-weight: 900; font-size: 15px; text-transform: uppercase; margin-bottom: 20px; border-left: 10px solid var(--primary); padding-left: 10px; }
        
        .gauge-outer { background: #dcdde1; height: 22px; border-radius: 50px; position: relative; margin: 15px 0 10px 0; border: 2px solid #2f3542; overflow: hidden; }
        .gauge-inner { height: 100%; width: 0%; border-radius: 50px; transition: width 1s; }
        .gauge-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; }

        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd; }
        .card-title { margin: 0 0 20px 0; font-size: 18px; font-weight: 800; border-bottom: 4px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        .table-laporan { width: 100%; border-collapse: collapse; }
        .table-laporan td, .table-laporan th { padding: 12px 10px; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        .val-laporan { text-align: right; font-weight: 700; font-family: 'Courier New', monospace; }
        .total-row { background: #f8f9fa; font-weight: 900; border-top: 3px solid #000; border-bottom: 3px double #000; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: 12px; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .filter-bar { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; border: 3px solid var(--accent); }
        .btn-csv { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Highlight untuk Kolum Baki */
        .col-baki { background: #f1f2f6; font-weight: 900 !important; color: var(--accent); }

        @media print { .no-print { display: none !important; } .container { max-width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="namaSyarikat" class="nama-syarikat-input" placeholder="NAMA PERNIAGAAN ANDA">

    <div class="grid-dashboard no-print">
        <div class="dashboard-card">
            <div class="card-header">Prestasi Untung Bersih</div>
            <div id="statusTeks" style="font-size: 22px; font-weight: 900;">-</div>
            <div class="gauge-outer"><div id="gaugeUntung" class="gauge-inner"></div></div>
            <p id="nasihatAI" style="font-size: 12px; margin-top: 15px; font-weight: 600; color: #7f8c8d;"></p>
        </div>
        <div class="dashboard-card">
            <div class="card-header">Baki Tunai Semasa</div>
            <div id="valBakiTunai" style="font-size: 32px; font-weight: 900; color: var(--accent);">RM 0.00</div>
            <p style="font-size: 12px; color: #7f8c8d;">Jumlah tunai & bank tersedia.</p>
        </div>
    </div>

    <div class="card no-print">
        <h2 class="card-title">Kemasukan Transaksi</h2>
        <form id="accForm">
            <div class="form-grid">
                <select id="jenis" required>
                    <option value="" disabled selected>Pilih Kategori...</option>
                    <optgroup label="MASUK (DEBIT)">
                        <option value="modal">Modal Sendiri</option>
                        <option value="jualan">Jualan Tunai</option>
                        <option value="pinjaman">Pinjaman Bank</option>
                    </optgroup>
                    <optgroup label="KELUAR (KREDIT)">
                        <option value="belian">Belian Stok</option>
                        <option value="belanja">Belanja Operasi</option>
                        <option value="aset">Belanja Aset</option>
                        <option value="ambilan_tunai">Ambilan Tunai</option>
                    </optgroup>
                </select>
                <input type="date" id="tarikh" required>
            </div>
            <div class="form-grid" style="grid-template-columns: 2fr 1fr;">
                <input type="text" id="butiran" placeholder="Keterangan..." required>
                <input type="number" id="amaun" step="0.01" placeholder="0.00" required>
            </div>
            <button type="submit" class="btn-primary">SIMPAN REKOD</button>
        </form>
    </div>

    <div class="filter-bar no-print">
        <select id="filterBulan" onchange="prosesAkaun()">
            <option value="semua">Keseluruhan</option>
            <option value="01">Januari</option><option value="02">Februari</option><option value="03">Mac</option>
            <option value="04">April</option><option value="05">Mei</option><option value="06">Jun</option>
            <option value="07">Julai</option><option value="08">Ogos</option><option value="09">September</option>
            <option value="10">Oktober</option><option value="11">November</option><option value="12">Disember</option>
        </select>
        <select id="filterTahun" onchange="prosesAkaun()"></select>
        <div style="margin-left:auto; display:flex; gap:10px;">
            <button onclick="eksportCSV()" class="btn-csv">📥 Excel</button>
            <button onclick="window.print()" class="btn-csv" style="background:var(--primary)">📄 Cetak</button>
        </div>
    </div>

    <div class="card">
        <h2 class="card-title">Sejarah Transaksi & Aliran Tunai</h2>
        <div style="overflow-x:auto;">
            <table class="table-laporan">
                <thead>
                    <tr style="background:#f1f2f6; font-weight:900; text-align:left;">
                        <th style="padding:15px;">Tarikh</th>
                        <th>Butiran</th>
                        <th style="text-align:right;">Masuk (RM)</th>
                        <th style="text-align:right;">Keluar (RM)</th>
                        <th style="text-align:right; background:#e0e3e7;">Baki (RM)</th>
                        <th class="no-print" style="text-align:center;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="senaraiTransaksi"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('ezi_gold_v98')) || [];
    const debitKeys = ['modal', 'pinjaman', 'jualan'];

    // Setup Tahun
    const fYear = document.getElementById('filterTahun');
    const curYear = new Date().getFullYear();
    for(let i=curYear; i>=curYear-2; i--) { fYear.innerHTML += `<option value="${i}">${i}</option>`; }
    document.getElementById('tarikh').valueAsDate = new Date();

    function prosesAkaun() {
        const fb = document.getElementById('filterBulan').value;
        const ft = document.getElementById('filterTahun').value;
        const f = (n) => n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // Tapis data mengikut bulan/tahun
        let filtered = data.filter(d => {
            const p = d.tarikh.split('-');
            return (fb === 'semua' || p[1] === fb) && p[0] === ft;
        });

        // Susun mengikut tarikh (Lama ke Baru) untuk kira baki yang betul
        filtered.sort((a, b) => new Date(a.tarikh) - new Date(b.tarikh));

        const tbody = document.getElementById('senaraiTransaksi');
        tbody.innerHTML = "";
        
        let runningBalance = 0;
        let totalJualan = 0;
        let totalBelanja = 0;

        filtered.forEach(d => {
            const isDebit = debitKeys.includes(d.jenis);
            if(isDebit) {
                runningBalance += d.amaun;
                if(d.jenis === 'jualan') totalJualan += d.amaun;
            } else {
                runningBalance -= d.amaun;
                if(d.jenis === 'belanja' || d.jenis === 'belian') totalBelanja += d.amaun;
            }

            tbody.insertAdjacentHTML('afterbegin', `
                <tr>
                    <td style="padding:15px;">${d.tarikh}</td>
                    <td><strong>${d.butiran}</strong><br><small>${d.jenis.toUpperCase()}</small></td>
                    <td style="text-align:right; color:var(--success); font-weight:700;">${isDebit ? f(d.amaun) : '-'}</td>
                    <td style="text-align:right; color:var(--danger); font-weight:700;">${!isDebit ? f(d.amaun) : '-'}</td>
                    <td style="text-align:right; font-weight:900; background:#f8f9fa;">${f(runningBalance)}</td>
                    <td class="no-print" style="text-align:center">
                        <button onclick="hapus(${d.id})" style="border:none; background:none; color:#bdc3c7; cursor:pointer; font-size:20px;">&times;</button>
                    </td>
                </tr>
            `);
        });

        // Update Dashboard
        document.getElementById('valBakiTunai').innerText = "RM " + f(runningBalance);
        
        const ub = totalJualan - totalBelanja;
        const statusTeks = document.getElementById('statusTeks');
        const gUntung = document.getElementById('gaugeUntung');
        
        statusTeks.innerText = ub >= 0 ? "UNTUNG: RM " + f(ub) : "RUGI: RM " + f(Math.abs(ub));
        statusTeks.style.color = ub >= 0 ? "var(--success)" : "var(--danger)";
        gUntung.style.width = ub >= 0 ? "100%" : "30%";
        gUntung.style.background = ub >= 0 ? "var(--success)" : "var(--danger)";
    }

    document.getElementById('accForm').onsubmit = function(e) {
        e.preventDefault();
        data.push({ 
            id: Date.now(), 
            jenis: document.getElementById('jenis').value, 
            tarikh: document.getElementById('tarikh').value, 
            butiran: document.getElementById('butiran').value, 
            amaun: parseFloat(document.getElementById('amaun').value) 
        });
        localStorage.setItem('ezi_gold_v98', JSON.stringify(data));
        prosesAkaun();
        this.reset();
        document.getElementById('tarikh').valueAsDate = new Date();
    };

    function hapus(id) { 
        if(confirm("Padam rekod ini?")) { 
            data = data.filter(d => d.id !== id); 
            localStorage.setItem('ezi_gold_v98', JSON.stringify(data)); 
            prosesAkaun(); 
        } 
    }

    const sn = document.getElementById('namaSyarikat');
    sn.value = localStorage.getItem('ezi_gold_sn') || "";
    sn.oninput = () => localStorage.setItem('ezi_gold_sn', sn.value);

    prosesAkaun();
</script>
</body>
</html>
